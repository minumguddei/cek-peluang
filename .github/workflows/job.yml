name: G

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt install jq gcc -y
      - env:
          RPC_URL: ${{ secrets.RPC_URL }}
        run: |
          chmod +x bin/run.sh
          ./bin/run.sh
