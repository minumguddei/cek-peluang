name: Audit Pasar GERBANGKU

on:
  schedule:
    - cron: '0 * * * *' # Jalan setiap 1 jam (biar hemat kuota GitHub)
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Block Data
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
        run: |
          # Ambil Blok Terbaru
          BLOCK=$(curl -s -X POST -H "Content-Type: application/json" --data '{"jsonrpc":"2.0","method":"eth_getBlockByNumber","params":["latest", true],"id":1}' $RPC_URL)
          
          # Hitung Total Transaksi
          TOTAL_TX=$(echo $BLOCK | jq '.result.transactions | length')
          
          # Hitung Transaksi yang panggil Flash Loan/DEX (Estimasi lewat Gas > 150k)
          MEV_TX=$(echo $BLOCK | jq '[.result.transactions[] | select((.gas | tonumber) > 150000)] | length')
          
          # Hitung yang Revert (Lihat transaksi tanpa 'to' atau method spesifik jika ada receipt, tapi di sini kita pakai estimasi gas)
          # Untuk akurasi tinggi, kita asumsikan bot yang gas-nya pas-pasan sering revert.
          REVERT_EST=$(echo $BLOCK | jq '[.result.transactions[] | select((.gas | tonumber) > 500000)] | length') # Bot berat biasanya gagal di gas besar
          
          # Ambil Contoh Bribe (Priority Fee)
          AVG_BRIBE=$(echo $BLOCK | jq -r '.result.transactions[0].maxPriorityFeePerGas // "0"' | xargs printf "%d" | awk '{print $1/10^18}')

          # Compile & Run Audit
          gcc src/audit.c -o audit
          ./audit $TOTAL_TX $MEV_TX $AVG_BRIBE $REVERT_EST > report.txt

      - name: Kirim ke NTFY
        run: |
          curl -d "$(<report.txt)" https://ntfy.sh/GERBANGKU
